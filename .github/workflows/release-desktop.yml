name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            artifact_name: fuseprobe-windows-x64
            bundle_glob: target/release/bundle/nsis/*-setup.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install frontend dependencies
        run: npm --prefix apps/desktop ci

      - name: Run frontend tests
        run: npm --prefix apps/desktop test -- --run

      - name: Run Rust tests
        run: cargo test

      - name: Build desktop installer
        run: npm --prefix apps/desktop run tauri:build

      - name: Generate release checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path "${{ matrix.bundle_glob }}" | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash *$($_.Name)" | Set-Content -Path "$($_.FullName).sha256" -Encoding ascii
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.bundle_glob }}
            ${{ matrix.bundle_glob }}.sha256

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            ${{ matrix.bundle_glob }}
            ${{ matrix.bundle_glob }}.sha256
